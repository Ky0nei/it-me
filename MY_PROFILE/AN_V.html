<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Retro Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600&display=swap"
      rel="stylesheet">

<style>
/* ────────────────────────────────────── */
/* 1. Cấu trúc CSS gốc (unchanged)       */
body{
    margin:0;padding:0;height:100vh;
    background-size:cover;font-family:'Josefin Sans',sans-serif;
    text-align:center;color:#ffeede;overflow:hidden
}
#bg-video{position:fixed;top:0;left:0;width:100%;height:100%;
           object-fit:cover;z-index:-1}

/* ────────────────────────────────────── */
/* 2. Card – căn giữa và kiểu dáng */
.card{
    background:rgba(255,240,230,.15);
    border:1px solid rgba(255,240,230,.3);
    border-radius:20px;padding:25px;width:1000px;margin:auto;
    box-shadow:0 0 20px rgba(0,0,0,.25)
}
.avatar{width:140px;height:140px;border-radius:50%;
        border:3px solid rgba(255,240,230,.8);margin-bottom:15px}
h1{font-size:28px;margin:10px 0;letter-spacing:1px;color:#ffe7d1}
p{opacity:.8;font-size:14px;margin-bottom:20px}

/* ────────────────────────────────────── */
/* 3. Social icons */
.socials{
    margin-top:15px;
}
.socials a{
    display:inline-block;
    width:38px;height:38px;
    margin:10px;
    transition:.35s;
}
.socials img{
    width:100%;height:100%;
    filter:brightness(.85);
}
.socials a:hover img{
    transform:scale(1.15) rotate(-3deg);
    filter:brightness(1)
}

/* ────────────────────────────────────── */
/* 4. Spotify Player */
.spotify-player{display:flex;gap:20px;justify-content:center}
.spotify-player iframe{flex:1}

/* ────────────────────────────────────── */
/* 5. Nút Play/Pause – scale effect added   */
.music-btn{
    position:fixed;
    bottom:30px;right:30px;
    width:60px;height:60px;
    border-radius:50%;
    background:#1db954;
    color:#fff;
    font-size:26px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    z-index:9999;
    transition:.3s ease transform, .3s ease box-shadow;
    outline:none;
}
.music-btn:hover{
    transform:scale(1.10);
}
.music-btn:active,
.music-btn.active{ /* active via JS or :active */
    transform:scale(.95);
}

/* NEW – paused state effect */
.music-btn.paused {
    background:#555;               /* thay màu nền khi pause */
}
.music-btn.paused img{
    filter:brightness(0.6);        /* icon hơi mờ hơn */
}

.music-btn img{
    width:100%;height:100%;
    object-fit:contain;
}

/* Focus style for keyboard users */
.music-btn:focus-visible {
    box-shadow: 0 0 0 3px #ffffff66, inset 0 -4px 8px rgba(0,0,0,.1);
}

/* ────────────────────────────────────── */
/* 6. Volume slider */
.volume-control {
    position:fixed; bottom:30px; left:30px;
    background:#0008; padding:10px 15px;
    border-radius:25px; display:flex;
    align-items:center; gap:8px;
}
.volume-control input[type=range]{
    -webkit-appearance:none; appearance:none;
    width:120px;height:4px;background:#fff1;border-radius:2px;
}
.volume-control input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none;
    width:14px;height:14px;border-radius:50%;background:#1db954;
    cursor:pointer;
}
</style>
</head>

<body>
<!-- Video nền -->
<video autoplay muted loop id="bg-video">
    <source src="background.mp4" type="video/mp4">
    <img src="fallback.jpg" alt="Background fallback">
</video>

<!-- Âm thanh nền (đã được ẩn) -->
<audio id="bg-audio" loop src="music.mp3"></audio>

<!-- Nút Play/Pause – dùng hình ảnh -->
<div id="music-btn" class="music-btn" role="button" aria-pressed="false">
    <img src="play.png" alt="Play" id="btn-icon">
</div>

<!-- Volume slider -->
<div class="volume-control">
    <label for="vol-slider">Âm lượng:</label>
    <input type="range" id="vol-slider" min="0" max="100" value="50">
    <span id="vol-perc">50%</span>
</div>

<div class="overlay">
    <div class="card">
        <img class="avatar" src="avatar.jpg" alt="Avatar">
        <h1>An Võ</h1>
        <p>• @Ky_0ne.a •</p>

        <!-- Spotify Player (hai nghệ sĩ) -->
        <div class="spotify-player">
            <iframe data-testid="embed-iframe"
                    style="border-radius:12px"
                    src="https://open.spotify.com/embed/artist/5HZtdKfC4xU0wvhEyYDWiY?utm_source=generator"
                    width="100%" height="352" frameBorder="0"
                    allowfullscreen
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy"></iframe>

            <iframe data-testid="embed-iframe"
                    style="border-radius:12px"
                    src="https://open.spotify.com/embed/artist/5dfZ5uSmzR7VQK0udbAVpf?utm_source=generator"
                    width="100%" height="352" frameBorder="0"
                    allowfullscreen
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy"></iframe>
        </div>

        <!-- Bài hát riêng lẻ -->
        <iframe style="border-radius:12px"
                src="https://open.spotify.com/embed/track/6kCU6i8iRrAAmJJ8Sj4JYC?utm_source=generator"
                width="100%" height="152" frameBorder="0"
                allowfullscreen
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"></iframe>

        <!-- Social Icons -->
        <div class="socials">
            <a href="https://www.instagram.com/ky_0ne.a/" target="_blank"><img src="instagram.png" alt="Instagram"></a>
            <a href="https://www.facebook.com/KyCloud.a" target="_blank"><img src="facebook.png" alt="Facebook"></a>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const audio = document.getElementById('bg-audio');
    const btn   = document.getElementById('music-btn');
    const icon  = document.getElementById('btn-icon');

    /* ----- Volume slider ----- */
    const volSlider = document.getElementById('vol-slider');
    const volPerc   = document.getElementById('vol-perc');
    audio.volume = volSlider.value / 100;          // set initial volume

    volSlider.addEventListener('input', () => {
        const val = volSlider.value;
        audio.volume = val / 100;
        volPerc.textContent = `${val}%`;
    });

    /* ----- Play/Pause button ----- */
    btn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play().catch(err => console.warn('Autoplay blocked:', err));
            icon.src = 'pause.png';
            icon.alt = 'Pause';
            btn.setAttribute('aria-pressed', 'true');
            btn.classList.remove('paused');   // remove paused style
        } else {
            audio.pause();
            icon.src = 'play.png';
            icon.alt = 'Play';
            btn.setAttribute('aria-pressed', 'false');
            btn.classList.add('paused');      // add paused style
        }
    });

    /* ----- Auto‑play on first interaction (optional) ----- */
    const initPlay = () => {
        audio.play().catch(() => {});   // ignore errors – user must click later
        document.removeEventListener('click', initPlay);
    };
    document.addEventListener('click', initPlay, { once: true });
});
</script>
</body>
</html>
